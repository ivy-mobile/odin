name: Release Odin CLI

on:
  push:
    tags:
      - "cmd/odin/v*"

permissions:
  contents: write

concurrency:
  group: release-odin-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^cmd/odin/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "RELEASE_VERSION=${BASH_REMATCH[1]}" >> "${GITHUB_ENV}"
          else
            echo "Invalid Odin CLI release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/odin/go.mod
          cache-dependency-path: cmd/odin/go.sum

      - name: Test
        working-directory: cmd/odin
        run: go test ./...

      - name: Vet
        working-directory: cmd/odin
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Lint
        working-directory: cmd/odin
        run: golangci-lint run ./...

      - name: Build release assets
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --config ./cmd/odin/.goreleaser.yaml
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Odin CLI v${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
